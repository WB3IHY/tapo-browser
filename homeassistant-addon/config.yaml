name: "Tapo Camera Manager"
description: >-
  Camera management, SD-card recording browsing/downloads, thumbnail
  previews, and direct segment playback for TP-Link Tapo cameras. Packages
  the tapo-browser fork (https://github.com/WB3IHY/tapo-browser) as a local
  add-on.
slug: tapo_browser
version: "0.2.0"
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
ports:
  8077/tcp: 8077
ports_description:
  8077/tcp: Tapo Camera Manager web UI
map:
  - type: data
    read_only: false
ingress: false
